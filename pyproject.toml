[tool.black]
line-length = 88
target-version = ["py310"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.venv
  | htmlcov
  | \.pytest_cache
  | \.ruff_cache
)/
'''

[tool.isort]
profile = "black"
line_length = 88
src_paths = ["line_provider", "bet_maker", "tests", "config"]
skip = [".venv", "htmlcov", ".pytest_cache", ".ruff_cache"]

[tool.ruff]
line-length = 88
target-version = "py310"
src = ["line_provider", "bet_maker", "tests", "config"]
exclude = [".venv", "htmlcov", ".pytest_cache", ".ruff_cache"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["bet_maker", "line_provider", "config"]
combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"**/conftest.py" = ["I001", "E402"]
"tests/scenarios/conftest.py" = ["I001"]
