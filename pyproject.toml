[tool.black]
line-length = 88
target-version = ["py310"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.venv
  | htmlcov
  | \.pytest_cache
  | \.ruff_cache
)/
'''

[tool.isort]
profile = "black"
line_length = 88
src_paths = ["line_provider", "bet_maker", "tests"]
skip = [".venv", "htmlcov", ".pytest_cache", ".ruff_cache"]

[tool.ruff]
line-length = 88
target-version = "py310"
src = ["line_provider", "bet_maker", "tests"]
exclude = [".venv", "htmlcov", ".pytest_cache", ".ruff_cache"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]
