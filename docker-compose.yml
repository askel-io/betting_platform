services:
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_INTERNAL://:9093,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  line-provider-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: line_provider
      POSTGRES_USER: line_provider
      POSTGRES_PASSWORD: line_provider
    ports:
      - "5433:5432"
    volumes:
      - line_provider_db:/var/lib/postgresql/data

  line-provider:
    build:
      context: .
      dockerfile: line_provider/Dockerfile
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/rest/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      line-provider-db:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://line_provider:line_provider@line-provider-db:5432/line_provider
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      KAFKA_EVENT_FINISHED_TOPIC: event.finished

  bet-maker-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bet_maker
      POSTGRES_USER: bet_maker
      POSTGRES_PASSWORD: bet_maker
    ports:
      - "5434:5432"
    volumes:
      - bet_maker_db:/var/lib/postgresql/data

  bet-maker:
    build:
      context: .
      dockerfile: bet_maker/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/rest/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      bet-maker-db:
        condition: service_started
      kafka:
        condition: service_healthy
      line-provider:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://bet_maker:bet_maker@bet-maker-db:5432/bet_maker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      KAFKA_EVENT_FINISHED_TOPIC: event.finished
      KAFKA_CONSUMER_GROUP: bet-maker
      LINE_PROVIDER_URL: http://line-provider:8000

volumes:
  line_provider_db:
  bet_maker_db:
