services:
  line-provider-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: line_provider
      POSTGRES_USER: line_provider
      POSTGRES_PASSWORD: line_provider
    ports:
      - "5432:5432"
  line-provider:
    build:
      context: .
      dockerfile: line_provider/Dockerfile
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/rest/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - line-provider-db
    environment:
      DATABASE_URL: postgresql+asyncpg://line_provider:line_provider@postgres:5432/line_provider

  bet-maker:
    build:
      context: .
      dockerfile: bet_maker/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/rest/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
